<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="From chip to modal — restrained, mostly small" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 20px; }
  .row { display: flex; gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 76px; height: 56px; background: var(--accent-subtle); border: 1.5px solid var(--accent); }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); }
  .px { font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const radii = [['xs','3px','badges · chips'],['sm','5px','inputs · buttons'],['md','8px','cards · menus'],['lg','12px','modals · panels'],['full','999px','pills · dots']];
    document.getElementById('row').innerHTML = radii.map(([t,px,use]) => `
      <div class="item">
        <div class="box" style="border-radius:var(--radius-${t})"></div>
        <span class="tok">--radius-${t}</span>
        <span class="px">${px} · ${use}</span>
      </div>`).join('');
  </script>
</body>
</html>
